name: 🇳🇵 NepState Daily Gold, Silver & Forex Videos

on:
  schedule:
    - cron: "15 1 * * *"   # 7:00 AM Nepal Time → Gold & Silver
    - cron: "15 6 * * *"   # 12:00 PM Nepal Time → Forex
  workflow_dispatch:
    inputs:
      video_type:
        description: 'Which video to generate?'
        required: true
        default: 'both'
        type: choice
        options:
          - both
          - gold
          - forex

jobs:
  gold-silver:
    name: 🥇 Gold & Silver Video
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
    if: >
      github.event_name == 'workflow_dispatch' && 
      (github.event.inputs.video_type == 'gold' || github.event.inputs.video_type == 'both') ||
      (github.event_name == 'schedule' && github.event.schedule == '15 1 * * *')
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🎬 Install FFmpeg
        run: sudo apt-get update -qq && sudo apt-get install -y ffmpeg

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 📦 Install dependencies
        run: pip install -r requirements.txt

      - name: 🔑 Setup Google credentials
        run: echo '${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}' > service_account.json

      - name: 🚀 Generate & Post Gold/Silver Video
        env:
          FB_ACCESS_TOKEN: ${{ secrets.FB_ACCESS_TOKEN }}
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          MAKE_WEBHOOK_URL: ${{ secrets.MAKE_WEBHOOK_URL }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
        run: python main.py

      - name: 📁 Save artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gold-silver-video-${{ github.run_number }}
          path: gold-silver-price.mp4
          retention-days: 7

  forex:
    name: 💱 Forex Rate Video
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
    if: >
      github.event_name == 'workflow_dispatch' && 
      (github.event.inputs.video_type == 'forex' || github.event.inputs.video_type == 'both') ||
      (github.event_name == 'schedule' && github.event.schedule == '15 6 * * *')
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🎬 Install FFmpeg
        run: sudo apt-get update -qq && sudo apt-get install -y ffmpeg

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 📦 Install dependencies
        run: pip install -r requirements.txt

      - name: 🔑 Setup Google credentials
        run: echo '${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}' > service_account.json

      - name: 🚀 Generate & Post Forex Video
        env:
          FB_ACCESS_TOKEN: ${{ secrets.FB_ACCESS_TOKEN }}
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          MAKE_WEBHOOK_URL: ${{ secrets.MAKE_WEBHOOK_URL }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
        run: python forex_video.py

      - name: 📁 Save artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: forex-video-${{ github.run_number }}
          path: forex-rate.mp4
          retention-days: 7
