name: 🇳🇵 NepState Daily Gold & Silver Video

on:
  schedule:
    # Posts at 8:00 AM Nepal Time (2:15 AM UTC)
    # Also good timing for USA morning scroll (evening NPT = USA morning)
    - cron: "15 2 * * *"
  workflow_dispatch:  # Allow manual trigger anytime

jobs:
  post-gold-silver:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # 1. Checkout repo
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      # 2. Install FFmpeg for video compilation
      - name: 🎬 Install FFmpeg
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg
          ffmpeg -version | head -1

      # 3. Setup Python
      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # 4. Install dependencies
      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 5. Restore service account from secret
      - name: 🔑 Set up Google credentials
        run: |
          echo '${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}' > service_account.json

      # 6. Run the pipeline
      - name: 🚀 Generate & Post Gold/Silver Video
        env:
          FB_ACCESS_TOKEN: ${{ secrets.FB_ACCESS_TOKEN }}
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          TIKTOK_ACCESS_TOKEN: ${{ secrets.TIKTOK_ACCESS_TOKEN }}
        run: python main.py

      # 7. Upload video as artifact (for debugging/review)
      - name: 📁 Save video artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gold-silver-video-${{ github.run_number }}
          path: gold-silver-price.mp4
          retention-days: 7
